name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build-and-release:
    runs-on: windows-2025
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkgVersion = [string]$pkg.version
          if ($tagVersion -ne $pkgVersion) {
            throw "Tag version '$tagVersion' does not match package.json version '$pkgVersion'."
          }
          Write-Host "Version check OK: $pkgVersion"

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build:web

      - name: Build desktop artifacts
        run: npx electron-builder --win nsis --publish never

      - name: Generate checksums for release assets
        id: checksums
        shell: pwsh
        run: |
          $exeFiles = Get-ChildItem -Path "release" -Filter "*.exe" | Sort-Object Name
          if (-not $exeFiles) {
            throw "No .exe files found in release directory."
          }

          $lines = @()
          foreach ($file in $exeFiles) {
            $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash.ToLower()
            $lines += "- ``$($file.Name)``"
            $lines += "  - ``sha256:$hash``"
          }

          "hash_lines<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $lines | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create artifact attestation
        # Best-effort provenance: a sigstore/rekor outage must not block the
        # release. Marked non-fatal so the release step still publishes the
        # already-built installer.
        continue-on-error: true
        uses: actions/attest@v4
        with:
          subject-path: "release/*.exe"

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          append_body: true
          body: |
            ## Windows download

            Please download the installer asset (`CS-Investor-Hub-Setup-*.exe`), not the source code archives.

            ## SmartScreen notice (unsigned app)

            On first start, Windows may show a SmartScreen warning.
            Click `More info` -> `Run anyway`.

            ## SHA256 checksums

            ${{ steps.checksums.outputs.hash_lines }}

            ## Build provenance

            This release includes GitHub artifact attestations for the generated installer.
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest*.yml
