name: Test Image Release

on:
  push:
    tags:
      - "test-*"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from"
        required: true
        default: "refactor/codebase-decomposition"
      tag_suffix:
        description: "Suffix for the test tag (e.g., codebase-fix-xyz)"
        required: true
        default: "manual-test"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (test tag)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/control-ger/csportfoliotracking-web
          tags: |
            type=ref,event=tag
            type=sha,format=short,prefix=test-
            type=raw,value=${{ github.event_name == 'workflow_dispatch' && format('test-manual-{0}', inputs.tag_suffix) || '' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
