name: Docs Governance

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docs-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Run docs guard
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          HEAD_SHA="${{ github.sha }}"

          if [ -z "$BASE_SHA" ] || [[ "$BASE_SHA" =~ ^0+$ ]]; then
            echo "[docs-guard] Base SHA unavailable, running default mode."
            npm run docs:guard
          else
            npm run docs:guard -- --base "$BASE_SHA" --head "$HEAD_SHA"
          fi
