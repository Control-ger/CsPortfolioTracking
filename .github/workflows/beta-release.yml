name: Beta Release

on:
  push:
    tags:
      - "beta-*"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from"
        required: true
        default: "refactor/codebase-decomposition"
      version:
        description: "Beta version label (e.g., 0.1.55-codebase)"
        required: true
        default: "0.0.1-beta"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write
  packages: write

jobs:
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/control-ger/csportfoliotracking-web
          tags: |
            type=ref,event=tag
            type=sha,format=short,prefix=beta-
            type=raw,value=${{ github.event_name == 'workflow_dispatch' && format('beta-manual-{0}', inputs.version) || '' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-desktop:
    name: Build Desktop Installer
    needs: build-docker
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build:web

      - name: Build desktop artifacts
        run: npx electron-builder --win nsis --publish never

      - name: Generate checksums
        id: checksums
        shell: pwsh
        run: |
          $exeFiles = Get-ChildItem -Path "release" -Filter "*.exe" | Sort-Object Name
          if (-not $exeFiles) {
            throw "No .exe files found in release directory."
          }
          $lines = @()
          foreach ($file in $exeFiles) {
            $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash.ToLower()
            $lines += "- ``$($file.Name)``"
            $lines += "  - ``sha256:$hash``"
          }
          "hash_lines<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $lines | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "release/*.exe"

      - name: Create Beta GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('beta-{0}', inputs.version) || github.ref_name }}
          name: Beta ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          prerelease: true
          generate_release_notes: true
          append_body: true
          body: |
            ## ⚠️ Beta Release — nicht für Produktion

            Dieser Release wird **nicht** auf den Produktionsserver deployed.

            ## Windows download

            Please download the installer asset (`CS-Investor-Hub-Setup-*.exe`), not the source code archives.

            ## SmartScreen notice (unsigned app)

            On first start, Windows may show a SmartScreen warning.
            Click `More info` -> `Run anyway`.

            ## SHA256 checksums

            ${{ steps.checksums.outputs.hash_lines }}

            ## Build provenance

            This release includes GitHub artifact attestations for the generated installer.
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest*.yml
