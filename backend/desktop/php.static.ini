; PHP configuration for the desktop sidecar when running the BUNDLED, fully
; static PHP runtime (resources/php/<platform>/php, fetched by
; scripts/fetch-php.mjs from static-php-cli).
;
; Unlike the system PHP config (php.ini), this file does NOT list `extension=`
; directives: curl, openssl, mbstring, sqlite3 and pdo_sqlite are compiled into
; the static binary. A static build cannot load shared modules at all, so an
; `extension=` line would only emit "Dynamic loading not supported" warnings.
;
; sidecar.js selects this file automatically when it resolves the bundled binary.

; --- Sidecar runtime settings -------------------------------------------------
; The sidecar binds to 127.0.0.1 only; never leak errors into HTTP responses.
display_errors = Off
log_errors = On
; error_log is provided at spawn time via `-d error_log=<userData>/logs/...`.
memory_limit = 256M
date.timezone = UTC
