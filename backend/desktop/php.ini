; PHP configuration for the desktop sidecar.
;
; Loaded by apps/desktop/main/sidecar.js via `php -c`, which makes the sidecar
; independent of the machine's global php.ini. The stock PHP distribution ships
; these extensions commented out, which previously crashed Steam login with
; "Call to undefined function curl_init()".
;
; `extension_dir` is intentionally NOT set here: it is machine-specific and is
; injected at spawn time via `-d extension_dir=<resolved>` by sidecar.js
; (derived from the resolved PHP binary location).

; --- Required extensions ------------------------------------------------------
extension=curl        ; Steam OpenID verification + all External API clients
extension=openssl     ; HTTPS for cURL + Steam session token encryption
extension=mbstring    ; multibyte string handling
extension=sqlite3     ; local SQLite store
extension=pdo_sqlite  ; PDO SQLite driver

; --- Sidecar runtime settings -------------------------------------------------
; The sidecar binds to 127.0.0.1 only; never leak errors into HTTP responses.
display_errors = Off
log_errors = On
; error_log is provided at spawn time via `-d error_log=<userData>/logs/...`.
memory_limit = 256M
date.timezone = UTC
