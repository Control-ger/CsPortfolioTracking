name: code
services:
    ***REMOVED***:
        cpu_shares: 90
        command: []
        container_name: cs***REMOVED***-***REMOVED***
        deploy:
            resources:
                limits:
                    memory: "12273582080"
        environment:
            MYSQL_DATABASE: ${DB_NAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_USER: ${DB_USER}
        hostname: cs***REMOVED***-***REMOVED***
        image: maria***REMOVED***:10.6
        networks:
            default: null
        restart: always
        volumes:
            - type: bind
              source: ${PROJECT_ROOT_PATH}/mysql
              target: /var/lib/mysql
              bind:
                create_host_path: true
    phpmyadmin:
        cpu_shares: 90
        command: []
        container_name: cs***REMOVED***-pma
        deploy:
            resources:
                limits:
                    memory: "12273582080"
        environment:
            PMA_HOST: ***REMOVED***
        hostname: cs***REMOVED***-pma
        image: phpmyadmin/phpmyadmin:latest
        networks:
            default: null
        ports:
            - "${PMA_PORT}:80"
        restart: always
    web:
        build:
            context: ${PROJECT_ROOT_PATH}
            dockerfile: Dockerfile
        cpu_shares: 90
        command: []
        container_name: cs***REMOVED***-web
        depends_on:
            ***REMOVED***:
                condition: service_started
                required: true
        deploy:
            resources:
                limits:
                    memory: "12273582080"
        hostname: cs***REMOVED***-web
        labels:
            casaos.icon: http://${APP_HOST}:${APP_PORT}/icon.png
            casaos.title: CS2 Portfolio Tracker
            icon: http://${APP_HOST}:${APP_PORT}/icon.png
            title: CS2 Portfolio Tracker
        networks:
            default: null
        ports:
            - "${APP_PORT}:80"
        restart: always
        volumes:
            # WICHTIG: .env Datei mounten damit die API-Key geladen wird
            - type: bind
              source: ${PROJECT_ROOT_PATH}/.env
              target: /var/www/html/.env
              bind:
                create_host_path: true
            # Frontend dist
            - type: bind
              source: ${DIST_PATH}
              target: /var/www/html
              bind:
                create_host_path: true
            # Backend API
            - type: bind
              source: ${BACKEND_PATH}
              target: /var/www/html/api
              bind:
                create_host_path: true
networks:
    default:
        name: code_default
x-casaos:
    author: self
    category: self
    hostname: ""
    icon: ""
    index: /
    is_uncontrolled: false
    port_map: "${APP_PORT}"
    scheme: http
    tips:
        custom: |
           In Dist liegt eine .htaccess, die nicht löschen :)

            URL: http://${APP_HOST}:${APP_PORT}
            Lokaler Pfad: ${DIST_PATH} (Frontend)
            Backend Pfad: ${BACKEND_PATH} (wird gemappt auf /api)

            Host (intern im Docker)	${DB_HOST}
            Port (extern)	3306
            Datenbank Name	${DB_NAME}
            User	${DB_USER}
            Passwort	in .env als DB_PASSWORD
            Root-Passwort	in .env als DB_ROOT_PASSWORD
            phpMyAdmin: http://${APP_HOST}:${PMA_PORT}

            WICHTIG: Die .env muss im Projekt***REMOVED*** liegen (${PROJECT_ROOT_PATH}/.env)
            Die wird dann automatisch in den Docker Container gemountet.
    title:
        custom: CS2 Portfolio Tracker
