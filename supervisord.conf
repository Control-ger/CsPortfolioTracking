[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
user=root
environment=PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

# Start Apache in foreground
[program:apache2]
command=/bin/bash -c "source /etc/apache2/envvars && rm -f ${APACHE_PID_FILE:-/var/run/apache2/apache2.pid} && exec /usr/sbin/apache2 -DFOREGROUND"
stdout_logfile=/var/log/supervisor/apache2.log
stderr_logfile=/var/log/supervisor/apache2-error.log
autorestart=true
autostart=true
priority=10
redirect_stderr=false

# PHP-based cron: Run sync-prices.php every hour
[program:csportfolio-sync-prices]
command=/bin/bash -c "while true; do php /var/www/html/api/sync-prices.php; sleep 3600; done"
autostart=true
autorestart=true
startsecs=10
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/supervisor/csportfolio-sync.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stderr_logfile=/var/log/supervisor/csportfolio-sync-error.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=5
priority=999

# Queue worker: refresh due item prices in small batches every 3 minutes
[program:csportfolio-price-queue-worker]
command=/bin/bash -c "while true; do php /var/www/html/api/sync-price-queue-worker.php; sleep 180; done"
autostart=true
autorestart=true
startsecs=5
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/supervisor/csportfolio-queue.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stderr_logfile=/var/log/supervisor/csportfolio-queue-error.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=5
priority=998

# CS updates ingest: poll SteamDB RSS frequently for low feed delay
[program:csportfolio-cs-updates-ingest]
command=/bin/bash -c "while true; do php /var/www/html/api/sync-cs-updates-rss.php; sleep 30; done"
autostart=true
autorestart=true
startsecs=5
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/supervisor/csportfolio-cs-updates.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stderr_logfile=/var/log/supervisor/csportfolio-cs-updates-error.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=5
priority=997

# CS updates AI rating: enrich feed entries asynchronously with market impact analysis
[program:csportfolio-cs-updates-ai-rating]
command=/bin/bash -c "while true; do php /var/www/html/api/sync-cs-updates-ai-rating.php; sleep 60; done"
autostart=true
autorestart=true
startsecs=5
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/supervisor/csportfolio-cs-updates-ai.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stderr_logfile=/var/log/supervisor/csportfolio-cs-updates-ai-error.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=5
priority=996
